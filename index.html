<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Pages JSON Fetch</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f9;
        }
        #output {
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <h1>Data from JSON File</h1>
    <div id="output">Loading data...</div>

    <script>
        // Fetch the response.json file relative to this HTML file
        fetch('./response.json')
            .then(response => {
                // Check if the response is okay (status 200)
                if (!response.ok) {
                    throw new Error('Network response was not ok: ' + response.statusText);
                }
                return response.json();
            })
            .then(data => {
                // Assuming your response.json has a "message" and "status" key
                // Customize this part based on your actual JSON structure
                const outputDiv = document.getElementById('output');
                outputDiv.innerHTML = `
                    <p><strong>Status:</strong> ${data.status || 'N/A'}</p>
                    <p><strong>Message:</strong> ${data.message || JSON.stringify(data)}</p>
                `;
            })
            .catch(error => {
                console.error('Error fetching data:', error);
                document.getElementById('output').innerText = 'Failed to load data. Check console for details.';
            });
    </script>

</body>
</html>
